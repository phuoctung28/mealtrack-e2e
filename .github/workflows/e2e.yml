name: E2E Tests

on:
  repository_dispatch:
    types: [run-e2e]
  workflow_dispatch:

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Doppler CLI
        run: curl -Ls https://cli.doppler.com/install.sh | sudo sh

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Cleanup test database
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --project mealtrack-e2e --config ci -- \
            npx ts-node --esm src/db/cleanup.ts

      - name: Seed test data
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --project mealtrack-e2e --config ci -- \
            npx ts-node --esm src/db/seed.ts

      - name: Run E2E tests
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          E2E_CONFIRM_STAGING: '1'
        run: |
          doppler run --project mealtrack-e2e --config ci -- \
            npx playwright test --reporter=github,html

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Cleanup test database
        if: always()
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --project mealtrack-e2e --config ci -- \
            npx ts-node --esm src/db/cleanup.ts
